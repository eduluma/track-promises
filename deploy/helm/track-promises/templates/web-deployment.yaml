apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "track-promises.fullname" . }}-web
  labels:
    {{- include "track-promises.labels" . | nindent 4 }}
    {{- include "track-promises.web.selectorLabels" . | nindent 4 }}
spec:
  {{- if not .Values.web.autoscaling.enabled }}
  replicas: {{ .Values.web.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "track-promises.web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "track-promises.web.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: web
        image: "{{ .Values.web.image.repository }}:{{ include "track-promises.imageTag" (dict "tag" .Values.web.image.tag "global" .Values.global) }}"
        imagePullPolicy: {{ .Values.global.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.web.service.port }}
          protocol: TCP
        env:
        - name: NODE_ENV
          value: production
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Values.web.existingSecret }}
              key: DATABASE_URL
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.web.existingSecret }}
              key: NEXTAUTH_SECRET
        - name: BREVO_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.web.existingSecret }}
              key: BREVO_API_KEY
        {{- range $key, $val := .Values.web.env }}
        - name: {{ $key }}
          value: {{ $val | quote }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.web.resources | nindent 12 }}
