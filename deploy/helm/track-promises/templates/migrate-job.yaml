apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "track-promises.fullname" . }}-migrate
  labels:
    {{- include "track-promises.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-1"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until nc -z {{ include "track-promises.fullname" . }}-postgres {{ .Values.postgres.service.port }}; do
            echo "waiting for postgres..."; sleep 3;
          done
      containers:
      - name: migrate
        image: "{{ .Values.migrate.image.repository }}:{{ include "track-promises.imageTag" (dict "tag" .Values.migrate.image.tag "global" .Values.global) }}"
        imagePullPolicy: {{ .Values.global.image.pullPolicy }}
        command: ["npm", "run", "db:migrate"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Values.migrate.existingSecret }}
              key: DATABASE_URL
        - name: NODE_ENV
          value: production
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
