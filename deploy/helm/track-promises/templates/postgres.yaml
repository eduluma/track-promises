{{- if .Values.postgres.enabled -}}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "track-promises.fullname" . }}-postgres
  labels:
    {{- include "track-promises.labels" . | nindent 4 }}
    {{- include "track-promises.postgres.selectorLabels" . | nindent 4 }}
spec:
  serviceName: {{ include "track-promises.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "track-promises.postgres.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "track-promises.postgres.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: postgres
        image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
        imagePullPolicy: IfNotPresent
        ports:
        - name: postgres
          containerPort: {{ .Values.postgres.service.port }}
          protocol: TCP
        env:
        - name: POSTGRES_DB
          value: track_promises
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.postgres.existingSecret }}
              key: {{ .Values.postgres.passwordKey }}
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "postgres", "-d", "track_promises"]
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "postgres", "-d", "track_promises"]
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.postgres.resources | nindent 12 }}
        {{- if .Values.postgres.persistence.enabled }}
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        {{- end }}
  {{- if .Values.postgres.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: ["ReadWriteOnce"]
      {{- if .Values.postgres.persistence.storageClass }}
      storageClassName: {{ .Values.postgres.persistence.storageClass | quote }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.postgres.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "track-promises.fullname" . }}-postgres
  labels:
    {{- include "track-promises.labels" . | nindent 4 }}
    {{- include "track-promises.postgres.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "track-promises.postgres.selectorLabels" . | nindent 4 }}
  ports:
  - port: {{ .Values.postgres.service.port }}
    targetPort: postgres
    protocol: TCP
    name: postgres
{{- end }}
