{{- if .Values.api.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "track-promises.fullname" . }}-api
  labels:
    {{- include "track-promises.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.api.ingress.tls.enabled }}
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    acme.cert-manager.io/http01-edit-in-place: "true"
    {{- end }}
spec:
  ingressClassName: {{ .Values.api.ingress.className }}
  {{- if .Values.api.ingress.tls.enabled }}
  tls:
  - hosts:
    - {{ .Values.api.ingress.host }}
    secretName: {{ .Values.api.ingress.tls.secretName }}
  {{- end }}
  rules:
  - host: {{ .Values.api.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "track-promises.fullname" . }}-api
            port:
              number: {{ .Values.api.service.port }}
{{- end }}
