---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: track-promises-postgres
  namespace: track-promises-prod
  labels:
    app: track-promises-postgres
spec:
  serviceName: track-promises-postgres
  replicas: 1
  selector:
    matchLabels:
      app: track-promises-postgres
  template:
    metadata:
      labels:
        app: track-promises-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:17-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: track_promises
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: track-promises-secrets
              key: POSTGRES_PASSWORD
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "postgres", "-d", "track_promises"]
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "postgres", "-d", "track_promises"]
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: track-promises-postgres
  namespace: track-promises-prod
  labels:
    app: track-promises-postgres
spec:
  type: ClusterIP
  clusterIP: None  # Headless for StatefulSet DNS
  selector:
    app: track-promises-postgres
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
