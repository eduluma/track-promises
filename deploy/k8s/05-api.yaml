---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: track-promises-api
  namespace: track-promises-prod
  labels:
    app: track-promises-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: track-promises-api
  template:
    metadata:
      labels:
        app: track-promises-api
    spec:
      imagePullSecrets:
      - name: regcred
      containers:
      - name: api
        image: ghcr.io/eduluma/track-promises-api:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 4000
          protocol: TCP
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "4000"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: track-promises-secrets
              key: DATABASE_URL
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 20
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: track-promises-api
  namespace: track-promises-prod
  labels:
    app: track-promises-api
spec:
  type: ClusterIP
  selector:
    app: track-promises-api
  ports:
  - port: 4000
    targetPort: http
    protocol: TCP
    name: http
