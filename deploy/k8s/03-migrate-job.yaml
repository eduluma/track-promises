apiVersion: batch/v1
kind: Job
metadata:
  name: track-promises-migrate
  namespace: track-promises-prod
  labels:
    app: track-promises-migrate
  annotations:
    # Re-run by deleting the job: kubectl delete job track-promises-migrate -n track-promises-prod
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-1"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: track-promises-migrate
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until nc -z track-promises-postgres 5432; do
            echo "waiting for postgres..."; sleep 3;
          done
      containers:
      - name: migrate
        image: ghcr.io/eduluma/track-promises-web:latest
        command: ["sh", "-c", "npm run db:migrate && npm run db:seed"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: track-promises-secrets
              key: DATABASE_URL
        - name: NODE_ENV
          value: production
        - name: TRACK_PROMISES_INCLUDE_SAMPLE_SEED_DATA
          value: "false"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
