version: '3'

vars:
  COMPOSE_CMD: docker compose
  ENV_SETUP: if [ -f .env ]; then set -a && . ./.env && set +a; fi

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all
    silent: true

  install:
    desc: Install Node dependencies
    cmds:
      - npm install

  build:
    desc: Build the Next.js app
    cmds:
      - npm run build

  lint:
    desc: Run ESLint checks
    cmds:
      - npm run lint

  test:
    desc: Run the Vitest suite
    cmds:
      - npm test

  compose:config:
    desc: Validate the Docker Compose configuration
    cmds:
      - '{{.ENV_SETUP}}; {{.COMPOSE_CMD}} config >/tmp/track-promises-compose.out'

  compose:migrate:
    desc: Apply database migrations against the local Docker Compose PostgreSQL service
    deps:
      - compose:config
    cmds:
      - '{{.ENV_SETUP}}; {{.COMPOSE_CMD}} up -d postgres'
      - '{{.ENV_SETUP}}; {{.COMPOSE_CMD}} --profile tools run --rm migrate'

  up:
    desc: Recreate the local Docker Compose stack and apply database migrations
    deps:
      - compose:config
    cmds:
      - '{{.ENV_SETUP}}; {{.COMPOSE_CMD}} down --remove-orphans'
      - '{{.ENV_SETUP}}; {{.COMPOSE_CMD}} up -d postgres'
      - '{{.ENV_SETUP}}; {{.COMPOSE_CMD}} --profile tools run --rm migrate'
      - '{{.ENV_SETUP}}; {{.COMPOSE_CMD}} up -d --force-recreate --remove-orphans'

  compose:up:
    desc: Recreate the local Docker Compose stack and apply database migrations
    cmds:
      - task: up

  compose:down:
    desc: Stop the local Docker Compose stack
    cmds:
      - '{{.ENV_SETUP}}; {{.COMPOSE_CMD}} down'

  compose:logs:
    desc: Tail Docker Compose logs
    cmds:
      - '{{.ENV_SETUP}}; {{.COMPOSE_CMD}} logs -f --tail=100'

  compose:deploy:
    desc: Build the app and deploy the local Docker Compose stack
    deps:
      - build
    cmds:
      - task: up
