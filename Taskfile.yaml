version: '3'

vars:
  COMPOSE_CMD: docker compose
  ENV_SETUP: if [ -f .env ]; then set -a && . ./.env && set +a; fi
  NS: track-promises-prod
  WEB_IMAGE: ghcr.io/eduluma/track-promises-web
  API_IMAGE: ghcr.io/eduluma/track-promises-api
  MIGRATE_IMAGE: ghcr.io/eduluma/track-promises-migrate
  GIT_TAG:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "local"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all
    silent: true

  install:
    desc: Install Node dependencies
    cmds:
      - npm install

  build:
    desc: Build the Next.js app
    cmds:
      - npm run build

  lint:
    desc: Run ESLint checks
    cmds:
      - npm run lint

  test:
    desc: Run the Vitest suite
    cmds:
      - npm test

  config:
    desc: Validate the Docker Compose configuration
    cmds:
      - '{{.ENV_SETUP}}; {{.COMPOSE_CMD}} config >/tmp/track-promises-compose.out'

  migrate:
    desc: Apply database migrations against the local Docker Compose PostgreSQL service
    deps:
      - config
    cmds:
      - '{{.ENV_SETUP}}; {{.COMPOSE_CMD}} up -d postgres'
      - '{{.ENV_SETUP}}; {{.COMPOSE_CMD}} --profile tools run --rm migrate'

  up:
    desc: Recreate web and api containers and apply database migrations (leaves postgres running)
    deps:
      - config
    cmds:
      - '{{.ENV_SETUP}}; {{.COMPOSE_CMD}} up -d postgres'
      - '{{.ENV_SETUP}}; {{.COMPOSE_CMD}} --profile tools run --rm migrate'
      - '{{.ENV_SETUP}}; {{.COMPOSE_CMD}} up -d --force-recreate --remove-orphans web api'

  down:
    desc: Stop the local Docker Compose stack
    cmds:
      - '{{.ENV_SETUP}}; {{.COMPOSE_CMD}} down'

  logs:
    desc: Tail Docker Compose logs
    cmds:
      - '{{.ENV_SETUP}}; {{.COMPOSE_CMD}} logs -f --tail=100'

  deploy:
    desc: Build the app and deploy the local Docker Compose stack
    deps:
      - build
    cmds:
      - task: up

  # ── Kubernetes (m1s docker-desktop) ──────────────────────────────────────
  k8s:ns:
    desc: Create the track-promises-prod namespace
    cmds:
      - kubectl apply -f deploy/k8s/00-namespace.yaml

  k8s:apply:
    desc: Apply plain kubectl manifests in order (secrets must already exist)
    cmds:
      - kubectl apply -f deploy/k8s/02-postgres.yaml
      - kubectl apply -f deploy/k8s/03-migrate-job.yaml
      - kubectl apply -f deploy/k8s/04-web.yaml
      - kubectl apply -f deploy/k8s/05-api.yaml

  k8s:logs:
    desc: Tail logs for all track-promises pods
    cmds:
      - kubectl logs -n track-promises-prod -l app.kubernetes.io/name=track-promises -f --max-log-requests 5

  k8s:status:
    desc: Show pod and service status in track-promises-prod
    cmds:
      - kubectl get all -n track-promises-prod

  # ── Helm (m1s docker-desktop) ─────────────────────────────────────────────
  helm:lint:
    desc: Lint the Helm chart
    cmds:
      - helm lint deploy/helm/track-promises -f deploy/helm/track-promises/values-prod.yaml

  helm:diff:
    desc: Diff pending Helm changes (requires helm-diff plugin)
    cmds:
      - helm diff upgrade track-promises deploy/helm/track-promises
          -n track-promises-prod
          -f deploy/helm/track-promises/values-prod.yaml

  helm:up:
    desc: Install or upgrade the Helm release to track-promises-prod
    cmds:
      - helm upgrade --install track-promises deploy/helm/track-promises
          --namespace track-promises-prod --create-namespace
          -f deploy/helm/track-promises/values-prod.yaml

  helm:down:
    desc: Uninstall the Helm release (keeps namespace and PVCs)
    cmds:
      - helm uninstall track-promises -n track-promises-prod

  # ── Image build & push ────────────────────────────────────────────────────
  ghcr:login:
    desc: Authenticate Docker to ghcr.io (requires GHCR_TOKEN env var or .env)
    cmds:
      - '{{.ENV_SETUP}}; echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin'

  image:build:
    desc: Build web, api, and migrate Docker images tagged with git SHA + latest
    cmds:
      - echo "🏗  Building {{.WEB_IMAGE}}:{{.GIT_TAG}}"
      - docker build -t {{.WEB_IMAGE}}:{{.GIT_TAG}} -t {{.WEB_IMAGE}}:latest -f Dockerfile.web .
      - echo "🏗  Building {{.API_IMAGE}}:{{.GIT_TAG}}"
      - docker build -t {{.API_IMAGE}}:{{.GIT_TAG}} -t {{.API_IMAGE}}:latest -f Dockerfile.api .
      - echo "🏗  Building {{.MIGRATE_IMAGE}}:{{.GIT_TAG}}"
      - docker build -t {{.MIGRATE_IMAGE}}:{{.GIT_TAG}} -t {{.MIGRATE_IMAGE}}:latest -f Dockerfile.migrate .

  image:push:
    desc: Push web, api, and migrate images to ghcr.io
    cmds:
      - docker push {{.WEB_IMAGE}}:{{.GIT_TAG}}
      - docker push {{.WEB_IMAGE}}:latest
      - docker push {{.API_IMAGE}}:{{.GIT_TAG}}
      - docker push {{.API_IMAGE}}:latest
      - docker push {{.MIGRATE_IMAGE}}:{{.GIT_TAG}}
      - docker push {{.MIGRATE_IMAGE}}:latest

  image:build-push:
    desc: Build and push both images in one step
    cmds:
      - task: image:build
      - task: image:push

  # ── k8s:regcred — create image pull secret ────────────────────────────────
  k8s:regcred:
    desc: "Create regcred pull secret in {{.NS}} (copies from re-dev if exists, else creates fresh)"
    cmds:
      - kubectl apply -f deploy/k8s/00-namespace.yaml
      - |
        if kubectl get secret regcred -n {{.NS}} >/dev/null 2>&1; then
          echo "✅ regcred already exists in {{.NS}}"
        elif kubectl get secret regcred -n re-dev >/dev/null 2>&1; then
          echo "📋 Copying regcred from re-dev → {{.NS}}..."
          kubectl get secret regcred -n re-dev -o json \
            | jq 'del(.metadata.namespace,.metadata.resourceVersion,.metadata.uid,.metadata.creationTimestamp,.metadata.annotations,.metadata.labels)' \
            | kubectl apply -n {{.NS}} -f -
          echo "✅ regcred copied to {{.NS}}"
        else
          echo "⚠️  No regcred found in re-dev. Creating from env vars..."
          '{{.ENV_SETUP}}'; kubectl create secret docker-registry regcred \
            --docker-server=ghcr.io \
            --docker-username="$GHCR_USER" \
            --docker-password="$GHCR_TOKEN" \
            -n {{.NS}} --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ regcred created in {{.NS}}"
        fi

  # ── k8s:deploy:prod — full production deploy ──────────────────────────────
  k8s:deploy:prod:
    desc: "Full prod deploy: build → push to ghcr → ensure regcred → helm upgrade → rollout status"
    cmds:
      - echo "🚀 Deploying track-promises to {{.NS}} (tag={{.GIT_TAG}})"
      - task: image:build
      - task: image:push
      - task: k8s:regcred
      - echo "📦 Helm upgrade --install..."
      - |
        helm upgrade --install track-promises deploy/helm/track-promises \
          --namespace {{.NS}} --create-namespace \
          -f deploy/helm/track-promises/values-prod.yaml \
          --set web.image.tag={{.GIT_TAG}} \
          --set api.image.tag={{.GIT_TAG}} \
          --set migrate.image.tag={{.GIT_TAG}} \
          --wait --timeout=3m
      - echo "📊 Rollout status..."
      - kubectl rollout status deployment/track-promises-web -n {{.NS}} --timeout=120s || true
      - kubectl rollout status deployment/track-promises-api -n {{.NS}} --timeout=120s || true
      - echo ""
      - kubectl get pods -n {{.NS}}
