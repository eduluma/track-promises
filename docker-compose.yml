services:
  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "${APP_PORT:-3300}:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/track_promises
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-replace-me}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:${APP_PORT:-3300}}
      TRACK_PROMISES_DEFAULT_TENANT: ${TRACK_PROMISES_DEFAULT_TENANT:-tamilnadu}
      TRACK_PROMISES_PLATFORM_DOMAIN: ${TRACK_PROMISES_PLATFORM_DOMAIN:-track-promises.localhost}
      TRACK_PROMISES_API_TRANSPORT: ${TRACK_PROMISES_API_TRANSPORT:-local}
      TRACK_PROMISES_API_BASE_URL: http://api:4000
      NODE_ENV: development
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  api:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run api:dev"
    ports:
      - "${API_PORT:-4300}:4000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/track_promises
      PORT: 4000
      NODE_ENV: development
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run db:migrate"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/track_promises
      NODE_ENV: development
    profiles:
      - tools
    volumes:
      - .:/app
      - migrate_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    expose:
      - "5432"
    ports:
      - "${DB_PORT:-5440}:5432"
    environment:
      POSTGRES_DB: track_promises
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d track_promises"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    profiles:
      - cache

volumes:
  app_node_modules:
  api_node_modules:
  migrate_node_modules:
  postgres_data:
