services:
  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    ports:
      - "${APP_PORT:-43000}:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/track_promises
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-replace-me}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:${APP_PORT:-43000}}
      TRACK_PROMISES_DEFAULT_TENANT: ${TRACK_PROMISES_DEFAULT_TENANT:-tamilnadu}
      TRACK_PROMISES_PLATFORM_DOMAIN: ${TRACK_PROMISES_PLATFORM_DOMAIN:-track-promises.localhost}
      NODE_ENV: development
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    expose:
      - "5432"
    environment:
      POSTGRES_DB: track_promises
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d track_promises"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    profiles:
      - cache

volumes:
  app_node_modules:
  postgres_data:
