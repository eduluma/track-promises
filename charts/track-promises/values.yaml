replicaCount: 1

image:
  repository: ghcr.io/example/track-promises
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 3000

ingress:
  enabled: true
  className: nginx
  host: track-promises.local
  wildcardHost: "*.track-promises.local"

resources: {}

env:
  NEXTAUTH_URL: https://track-promises.local
